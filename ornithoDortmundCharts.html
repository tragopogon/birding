<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vogelbeobachtungen Dortmund - Monatsverteilung</title>
  <style>
    :root {
      --bg: #f5f7f0;
      --panel: #ffffff;
      --ink: #132018;
      --muted: #5f7365;
      --line: #d7e0d4;
      --bar: #6f8976;
      --bar-hi: #d95f02;
      --head: #254336;
      --chip: #edf3e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, #ffffff 0%, transparent 42%),
        radial-gradient(circle at 80% 90%, #e7efe3 0%, transparent 35%),
        var(--bg);
    }
    .wrap {
      max-width: 100%;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.7rem;
      letter-spacing: 0.2px;
      color: var(--head);
    }
    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      grid-template-rows: auto auto;
      gap: 8px 10px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      position: sticky;
      top: 8px;
      z-index: 2;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.05);
    }
    .toolbar input,
    .toolbar select {
      width: 100%;
      height: 40px;
      border: 1px solid #c8d4c6;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 0.95rem;
      background: #fbfdf9;
      color: var(--ink);
    }
    .count {
      padding: 0 10px;
      white-space: nowrap;
      font-size: 0.9rem;
      color: var(--muted);
    }
    #cards {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto auto;
      gap: 6px;
      min-height: 196px;
      min-width: 0;
    }
    .names { display: grid; gap: 2px; }
    .name-line {
      font-size: 0.93rem;
      line-height: 1.3;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
    }
    .de {
      font-weight: 700;
      color: #173126;
      white-space: nowrap;
    }
    .sep {
      color: #a0b09a;
      margin: 0 4px;
    }
    .sci {
      font-style: italic;
      color: #3f5a4b;
      white-space: nowrap;
    }
    .en {
      color: #7a8f84;
      white-space: nowrap;
    }
    .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .chip {
      background: var(--chip);
      border: 1px solid #d7e2d2;
      border-radius: 99px;
      padding: 2px 8px;
      font-size: 0.77rem;
      color: #274739;
    }
    .chart {
      width: 100%;
      height: 114px;
      display: block;
      border-top: 1px dashed #d9e2d7;
      padding-top: 5px;
    }
    .axis-label {
      font-size: 9px;
      fill: #58705f;
      font-weight: 600;
    }
    .tick-label {
      font-size: 9px;
      fill: #6f8476;
    }
    .grid {
      stroke: #dee6dc;
      stroke-width: 1;
      shape-rendering: crispEdges;
    }
    .bar {
      fill: var(--bar);
      opacity: 0.86;
    }
    .bar.highlight {
      fill: var(--bar-hi);
      opacity: 1;
    }
    .bar-value {
      font-size: 8px;
      fill: #1b1818;
      font-weight: 700;
      dominant-baseline: auto;
    }
    .hide-zero-label {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0 4px;
    }
    .hide-zero-label input[type=checkbox] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .toolbar-filter {
      grid-column: 1 / -1;
    }
    .label-short, .count-short { display: none; }
    @media (max-width: 480px) {
      .label-long { display: none; }
      .label-short { display: inline; }
      .count-long { display: none; }
      .count-short { display: inline; }
      .toolbar select { padding: 0 4px; font-size: 0.82rem; }
      .hide-zero-label { font-size: 0.82rem; }
    }
    @media (max-width: 840px) {
      .count { padding: 0; }
    }
  </style>
</head>

<script>
    const filterInput = document.getElementById("filterInput");
    const monthSelect = document.getElementById("monthSelect");
    const hideZeroCheck = document.getElementById("hideZeroCheck");
    const cardsEl = document.getElementById("cards");
    const countInfo = document.getElementById("countInfo");

    function normalize(s) {
      return (s || "")
        .toLowerCase()
        // .normalize("NFD")
        // .replace(/\p{Diacritic}/gu, "")
        // .replace(/ß/g, "ss");
    }

    function axisMax(maxVal) {
      if (maxVal <= 0) return 1;
      const mag = 10 ** Math.floor(Math.log10(maxVal));
      return Math.ceil(maxVal / mag) * mag;
    }

    function chartSvg(values, highlightedMonth, monthInitials) {
      const w = 312;
      const h = 100;
      const left = 22;
      const right = 4;
      const top = 8;
      const bottom = 22;
      const plotW = w - left - right;
      const plotH = h - top - bottom;

      const maxRaw = Math.max(...values);
      const yMax = axisMax(maxRaw);
      const barGap = 3;
      const barW = (plotW - barGap * 11) / 12;

      const yMid = top + plotH / 2;
      const yTop = top;
      const yBottom = top + plotH;

      let bars = "";
      let labels = "";

      let valueLabels = "";
      values.forEach((v, i) => {
        const bh = (v / yMax) * plotH;
        const x = left + i * (barW + barGap);
        const y = top + (plotH - bh);
        const cls = i === highlightedMonth ? "bar highlight" : "bar";
        bars += `<rect class="${cls}" x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barW.toFixed(2)}" height="${Math.max(0, bh).toFixed(2)}" rx="1"></rect>`;
        labels += `<text class="axis-label" x="${(x + barW / 2).toFixed(2)}" y="${h - 8}" text-anchor="middle">${monthInitials[i] || "?"}</text>`;
        if (v > 0) {
          valueLabels += `<text class="bar-value" x="${(x + barW / 2).toFixed(2)}" y="${(yBottom - 2).toFixed(2)}" text-anchor="middle">${v}</text>`;
        }
      });

      return `
        <svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
          <line class="grid" x1="${left}" y1="${yBottom}" x2="${w - right}" y2="${yBottom}"></line>
          <line class="grid" x1="${left}" y1="${yMid}" x2="${w - right}" y2="${yMid}"></line>
          <line class="grid" x1="${left}" y1="${yTop}" x2="${w - right}" y2="${yTop}"></line>

          <text class="tick-label" x="2" y="${(yBottom + 3).toFixed(2)}">0</text>
          <text class="tick-label" x="2" y="${(yMid + 3).toFixed(2)}">${Math.round(yMax / 2)}</text>
          <text class="tick-label" x="2" y="${(yTop + 3).toFixed(2)}">${yMax}</text>

          ${bars}
          ${valueLabels}
          ${labels}
        </svg>
      `;
    }

    function render(species, query, monthIndex, monthNames, hideZero) {
      const q = normalize(query);
      const visible = species.filter((d) =>
        (!hideZero || (d.months[monthIndex] ?? 0) > 0) &&
        (!q || d._key.includes(q))
      );

      const monthInitials = monthNames.map((m) => (m || "").slice(0, 1));

      cardsEl.innerHTML = visible
        .map((d) => {
          const monthValue = d.months[monthIndex] ?? 0;
          return `
            <article class="card">
              <div class="names">
                <div class="name-line">
                  <span class="de">${d.de}</span>
                  <span class="sep"></span>
                  <span class="sci">${d.sci}</span>
                  ${d.en ? `<span class="sep"></span><span class="en">${d.en}</span>` : ""}
                  <span class="sep"></span>
                  <span class="chip">Jahressumme: ${d._sum}</span>
                  </div>
                <div class="meta">
                  <!-- <span class="chip">${monthNames[monthIndex]}: ${monthValue}</span> -->
                  
                  <!-- <span class="chip">Max Monat: ${d._max}</span> -->
                </div>
              </div>
              ${chartSvg(d.months, monthIndex, monthInitials)}
            </article>
          `;
        })
        .join("");

      countInfo.innerHTML = `<span class="count-long">${visible.length} von ${species.length} Arten</span><span class="count-short">${visible.length}&thinsp;/&thinsp;${species.length}</span>`;
    }

    function init() {
      const payload = JSON.parse(document.getElementById("jsonData").textContent);
      const monthNames = payload.meta.months;

      const species = payload.species.map((d) => {
        const months = Array.isArray(d.observations) ? d.observations : [];
        const max = months.length ? Math.max(...months) : 0;
        const sum = months.reduce((a, b) => a + b, 0);
        const en = d.en || "";
        return {
          de: d.de,
          sci: d.sci,
          en,
          months,
          _max: max,
          _sum: sum,
          _key: normalize(`${d.de} ${d.sci} ${en}`)
        };
      });

      monthNames.forEach((m, idx) => {
        const opt = document.createElement("option");
        opt.value = String(idx);
        opt.textContent = m;
        monthSelect.appendChild(opt);
      });

      const currentMonth = new Date().getMonth();
      monthSelect.value = String(Math.min(Math.max(currentMonth, 0), monthNames.length - 1));

      const rerender = () => render(species, filterInput.value, Number(monthSelect.value), monthNames, hideZeroCheck.checked);
      filterInput.addEventListener("input", rerender);
      monthSelect.addEventListener("change", rerender);
      hideZeroCheck.addEventListener("change", rerender);
      rerender();
    }

    init();
  </script>
</body>
